services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
  backend:
    build:
      context: ./mingachevir-real-estate-agency-server
      dockerfile: Dockerfile
    environment:
      - DB_HOST=db
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
    volumes:
      - uploads:/uploads
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8087:8087" 
    networks:
      - app-network

  frontend-site:
    build:
      context: ./mingachevir-real-estate-agency-fe
      dockerfile: Dockerfile
    networks:
      - app-network

  frontend-admin:
    build:
      context: ./ngx-admin
      dockerfile: Dockerfile
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - uploads:/uploads
      - ./logs:/app/logs
    ports:
      - "0080:0080"  
      - "0081:0081" 
    depends_on:
      - backend
      - frontend-site
      - frontend-admin
    networks:
      - app-network

volumes:
  db-data:
  uploads:

networks:
  app-network:
    driver: bridge