
<div *ngIf="loading" class="text-center mb-3">
  <div class="spinner-border text-primary" role="status">
    <span class="visually-hidden">Giriş Edilir...</span>
  </div>
  <p>Giriş Edilir...</p>
</div>

<div class="auth-container" *ngIf="!isLoggedIn() && !loading">
  <form (ngSubmit)="onSubmit()" class="login-form">
    <h2 class="form-title">Giriş</h2>
    <div class="form-group">
      <input
        [(ngModel)]="username"
        name="username"
        placeholder="Email"
        required
        class="input-field"
        type="email"
      />
    </div>
    <div class="form-group">
      <input
        [(ngModel)]="password"
        type="password"
        name="password"
        placeholder="Şifrə"
        required
        class="input-field"
      />
    </div>
    <button type="submit" class="submit-btn">Giriş Et</button>
  </form>
</div>

<div class="auth-container" *ngIf="isLoggedIn() && !loading">
  <p class="welcome-message">{{ username }} e-mail ilə giriş edildi</p>
  <button (click)="logout()" class="logout-btn">Çıxış</button>
</div>
